services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: family_budget
      POSTGRES_USER: family_budget
      POSTGRES_PASSWORD: family_budget
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U family_budget -d family_budget']
      interval: 10s
      timeout: 5s
      retries: 5

  scheduling:
    image: node:24-alpine
    profiles:
      - workers
    working_dir: /workspace
    command: sh -lc "corepack enable && pnpm dev:scheduling"
    environment:
      DATABASE_URL: postgres://family_budget:family_budget@postgres:5432/family_budget
      SCHEDULING_ENABLED: 'true'
      SCHEDULING_TIMEZONE: America/Chicago
    volumes:
      - .:/workspace
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
